name: All-For-One Pi reference status

on:
  push:
    branches: [pi]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: allforone-pi-reference-status
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout product branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Report Pi reference relationship
        run: |
          set -euo pipefail
          git fetch --no-tags origin pi:refs/remotes/origin/pi main:refs/remotes/origin/main

          pi_sha="$(git rev-parse origin/pi)"
          main_sha="$(git rev-parse origin/main)"
          counts="$(git rev-list --left-right --count "${pi_sha}...${main_sha}")"
          read -r pi_only main_only <<< "${counts}"

          {
            echo '## Pi reference status'
            echo
            printf -- '- `pi`: `%s`\n' "${pi_sha}"
            printf -- '- `main`: `%s`\n' "${main_sha}"
            printf -- '- Pi-only commits: `%s`\n' "${pi_only}"
            printf -- '- All-For-One-only commits: `%s`\n' "${main_only}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if git merge-base --is-ancestor origin/pi origin/main; then
            echo 'The current Pi reference is already contained in main.' >> "${GITHUB_STEP_SUMMARY}"
          else
            echo 'The branches have intentionally diverged or contain unreviewed Pi changes. Review selectively; this is not a failure.' >> "${GITHUB_STEP_SUMMARY}"
          fi
