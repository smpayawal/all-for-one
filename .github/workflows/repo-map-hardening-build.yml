name: Repository map hardening build

on:
  pull_request:
    branches: [allforone]
    paths:
      - .github/workflows/repo-map-hardening-build.yml
      - .github/scripts/repo-map-hardening.py

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply bounded completeness hardening
        run: python3 .github/scripts/repo-map-hardening.py

      - name: Format and validate focused changes
        run: |
          npx biome check --write \
            packages/coding-agent/src/extensions/repo-map/index.ts \
            packages/coding-agent/test/repo-map.test.ts \
            docs/all-for-one/optional-capabilities.md
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/repo-map.test.ts
          npm run check

      - name: Upload exact files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repo-map-hardening-files
          path: |
            packages/coding-agent/src/extensions/repo-map/index.ts
            packages/coding-agent/test/repo-map.test.ts
            docs/all-for-one/optional-capabilities.md
          if-no-files-found: error
          retention-days: 1
