name: Theme Build Diagnostic

on:
  pull_request:
    branches: [ui/enhancement]

permissions:
  contents: read

jobs:
  build-log:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Capture build output
        id: build
        shell: bash
        run: |
          set +e
          npm run build > theme-build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: theme-build-log
          path: theme-build.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when build failed
        if: steps.build.outputs.status != '0'
        run: exit 1
