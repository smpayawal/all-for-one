name: Theme Compatibility Validation

on:
  pull_request:
    branches: [ui/enhancement]

permissions:
  contents: write

jobs:
  validate-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout ui/enhancement
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ui/enhancement
          fetch-depth: 0
          persist-credentials: true

      - name: Restore compatibility helper without rewriting theme names
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('packages/coding-agent/src/modes/interactive/theme/theme.ts')
          text = path.read_text()
          marker = '''export function resolveThemeSetting(
          '''
          helper = '''/**
           * Compatibility hook retained for downstream callers that previously
           * migrated removed theme names. Native Pi themes now pass through unchanged.
           */
          export function normalizeThemeSetting(themeSetting: string | undefined): string | undefined {
          \treturn themeSetting;
          }

          '''
          if 'export function normalizeThemeSetting(' not in text:
              if marker not in text:
                  raise SystemExit('resolveThemeSetting marker not found')
              path.write_text(text.replace(marker, helper + marker, 1))
          PY

      - name: Add compatibility regression assertion
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('packages/coding-agent/test/bundled-themes.test.ts')
          text = path.read_text()
          if '\tnormalizeThemeSetting,\n' not in text:
              text = text.replace('\tinitTheme,\n', '\tinitTheme,\n\tnormalizeThemeSetting,\n')
          needle = '''\ttest("uses native automatic light and dark selection", () => {
          \t\texpect(resolveThemeSetting("light/dark", "light")).toBe("light");
          \t\texpect(resolveThemeSetting("light/dark", "dark")).toBe("dark");
          \t});
          '''
          replacement = '''\ttest("uses native automatic light and dark selection", () => {
          \t\texpect(normalizeThemeSetting("light")).toBe("light");
          \t\texpect(normalizeThemeSetting("light/dark")).toBe("light/dark");
          \t\texpect(resolveThemeSetting("light/dark", "light")).toBe("light");
          \t\texpect(resolveThemeSetting("light/dark", "dark")).toBe("dark");
          \t});
          '''
          if needle in text:
              text = text.replace(needle, replacement, 1)
          elif 'expect(normalizeThemeSetting("light"))' not in text:
              raise SystemExit('theme regression test marker not found')
          path.write_text(text)
          PY

      - name: Verify cleanup scope
        shell: bash
        run: |
          set -euo pipefail
          test ! -e packages/coding-agent/theme/tokyonight.json
          test -e packages/coding-agent/src/modes/interactive/theme/dark.json
          test -e packages/coding-agent/src/modes/interactive/theme/light.json
          ! git grep -n -i -E 'tokyonight|tokyo night|microsoft[ -]?foundry|foundry' -- .
          git diff --check

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build workspace
        run: npm run build

      - name: Run focused theme and skill tests
        run: >-
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run
          test/bundled-themes.test.ts
          test/theme-picker.test.ts
          test/theme-detection.test.ts
          test/native-skills.test.ts

      - name: Format touched files and regenerate package locks
        shell: bash
        run: |
          set -euo pipefail
          npx biome check --write \
            packages/coding-agent/src/modes/interactive/theme/theme.ts \
            packages/coding-agent/test/bundled-themes.test.ts \
            packages/coding-agent/package.json \
            packages/coding-agent/docs/themes.md
          npm run shrinkwrap:coding-agent
          npm run install-lock:coding-agent

      - name: Run targeted static validation
        shell: bash
        run: |
          set -euo pipefail
          npx biome check \
            packages/coding-agent/src/modes/interactive/theme/theme.ts \
            packages/coding-agent/test/bundled-themes.test.ts \
            packages/coding-agent/package.json \
            packages/coding-agent/docs/themes.md
          npm run check:shrinkwrap
          npm run check:install-lock:coding-agent
          npx tsgo --noEmit

      - name: Restore generated model catalogs
        shell: bash
        run: |
          set -euo pipefail
          git restore --worktree -- \
            packages/ai/src/models.generated.ts \
            packages/ai/src/image-models.generated.ts \
            ':(glob)packages/ai/src/providers/*.models.ts'

      - name: Commit validated compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/theme-diagnostic.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: preserve native theme compatibility"
          git push origin HEAD:ui/enhancement
