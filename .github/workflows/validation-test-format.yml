name: Validation change format diagnostic

on:
  pull_request:
    branches: [allforone]
    paths:
      - .github/workflows/validation-test-format.yml
      - .github/workflows/allforone-ci.yml
      - docs/all-for-one/validation.md
      - packages/coding-agent/src/extensions/validate/index.ts
      - packages/coding-agent/test/validate-executable-identity.test.ts

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format final changes
        run: |
          npx biome check --write \
            .github/workflows/allforone-ci.yml \
            docs/all-for-one/validation.md \
            packages/coding-agent/src/extensions/validate/index.ts \
            packages/coding-agent/test/validate-executable-identity.test.ts

      - name: Verify focused change
        run: |
          npx biome check \
            .github/workflows/allforone-ci.yml \
            docs/all-for-one/validation.md \
            packages/coding-agent/src/extensions/validate/index.ts \
            packages/coding-agent/test/validate-executable-identity.test.ts
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/validate-executable-identity.test.ts

      - name: Upload formatted files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validation-change-format
          path: |
            .github/workflows/allforone-ci.yml
            docs/all-for-one/validation.md
            packages/coding-agent/src/extensions/validate/index.ts
            packages/coding-agent/test/validate-executable-identity.test.ts
          if-no-files-found: error
          retention-days: 1
