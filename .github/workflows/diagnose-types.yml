name: Diagnose TypeScript

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts >/dev/null 2>&1

      - name: Build packages
        run: npm run build >/dev/null 2>&1

      - name: Capture TypeScript diagnostic
        run: |
          set +e
          npm exec -- tsgo --noEmit > ts-errors.txt 2>&1
          echo "$?" > ts-status.txt
          exit 0

      - name: Upload TypeScript diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: typescript-diagnostic
          path: |
            ts-errors.txt
            ts-status.txt

      - name: Enforce TypeScript result
        run: test "$(cat ts-status.txt)" -eq 0
