name: Repository Map Format Diagnostic

on:
  pull_request:
    branches: [allforone]
    paths:
      - packages/coding-agent/src/extensions/repo-map/index.ts
      - packages/coding-agent/test/repo-map.test.ts
      - .github/workflows/repo-map-format-diagnostic.yml

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply safe Biome formatting and fixes
        run: >-
          npm exec -- biome check --write
          packages/coding-agent/src/extensions/repo-map/index.ts
          packages/coding-agent/test/repo-map.test.ts

      - name: Upload formatted files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repo-map-formatted
          path: |
            packages/coding-agent/src/extensions/repo-map/index.ts
            packages/coding-agent/test/repo-map.test.ts
          if-no-files-found: error
          retention-days: 1
