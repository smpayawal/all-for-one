name: Repository Map Format Diagnostic

on:
  pull_request:
    branches: [allforone]
    paths:
      - packages/coding-agent/src/extensions/repo-map/index.ts
      - packages/coding-agent/test/repo-map.test.ts
      - .github/workflows/repo-map-format-diagnostic.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply targeted correctness corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("packages/coding-agent/src/extensions/repo-map/index.ts")
          text = source.read_text()
          text = text.replace(
              'import { basename, extname, relative, resolve, sep } from "node:path";',
              'import { basename, extname, resolve, sep } from "node:path";',
          )
          text = text.replace(
              '["status", "--porcelain=v1", "-uno"]',
              '["status", "--porcelain=v1"]',
          )
          text = text.replace(
              'if (cached?.cacheKey === git.cacheKey) return { ...cached, reason: input.reason };',
              '''if (cached?.cacheKey === git.cacheKey) {
          const rendered = renderRepoMap({
          head: cached.head,
          workingTree: cached.workingTree,
          reason: input.reason,
          trackedFileCount: cached.trackedFileCount,
          consideredFileCount: cached.consideredFileCount,
          changedFiles: cached.changedFiles,
          files: cached.files,
          });
          return {
          ...cached,
          reason: input.reason,
          rendered: rendered.rendered,
          truncated: rendered.truncated,
          };
          }''',
          )
          source.write_text(text)

          test = Path("packages/coding-agent/test/repo-map.test.ts")
          test_text = test.read_text().replace(
              '["status --porcelain=v1 -uno", ""]',
              '["status --porcelain=v1", ""]',
          ).replace(
              '{ command: "git", args: ["status", "--porcelain=v1", "-uno"] }',
              '{ command: "git", args: ["status", "--porcelain=v1"] }',
          )
          test.write_text(test_text)
          PY

      - name: Apply safe Biome formatting and fixes
        run: >-
          npm exec -- biome check --write
          packages/coding-agent/src/extensions/repo-map/index.ts
          packages/coding-agent/test/repo-map.test.ts

      - name: Commit formatted files
        run: |
          if git diff --quiet -- packages/coding-agent/src/extensions/repo-map/index.ts packages/coding-agent/test/repo-map.test.ts; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/coding-agent/src/extensions/repo-map/index.ts packages/coding-agent/test/repo-map.test.ts
          git commit -m "fix(coding-agent): format adaptive repository map"
          git push origin HEAD:${{ github.head_ref }}
