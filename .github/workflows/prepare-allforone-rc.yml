name: Prepare All-For-One RC

on:
  pull_request:
    branches:
      - allforone
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.pull_request.head.ref == 'release/0.1.0-rc.1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Inspect release metadata
        run: |
          node -e "const p=require('./package.json'); const l=require('./package-lock.json'); console.log(JSON.stringify({package:p.version,lock:l.version,lockRoot:l.packages?.['']?.version},null,2))"
          grep -n 'version:' packages/coding-agent/src/allforone/product.ts
          sed -n '1,40p' CHANGELOG-AFO.md

      - name: Prepare release metadata
        run: node scripts/prepare-allforone-release.mjs 0.1.0-rc.1 --date 2026-07-19 --json

      - name: Commit prepared release
        env:
          PI_ALLOW_LOCKFILE_CHANGE: '1'
        run: |
          set -euo pipefail
          rm .github/workflows/prepare-allforone-rc.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json packages/coding-agent/src/allforone/product.ts CHANGELOG-AFO.md .github/workflows/prepare-allforone-rc.yml
          git commit -m 'chore: prepare All-For-One 0.1.0-rc.1'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
