name: Repository Map Windows Diagnostic

on:
  pull_request:
    branches: [allforone]
    paths:
      - packages/coding-agent/src/extensions/repo-map/index.ts
      - packages/coding-agent/test/repo-map.test.ts
      - .github/workflows/repo-map-windows-diagnostic.yml

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run repository-map test
        shell: pwsh
        run: |
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/repo-map.test.ts *>&1 | Tee-Object -FilePath repo-map-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repo-map-windows-test-output
          path: repo-map-test.log
          if-no-files-found: error
          retention-days: 1
