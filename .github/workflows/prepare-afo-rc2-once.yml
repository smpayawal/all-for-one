name: Prepare All-For-One 0.1.0-rc.2 Once

on:
  push:
    branches:
      - release/0.1.0-rc.2
    paths:
      - .github/workflows/prepare-afo-rc2-once.yml

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact release branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: release/0.1.0-rc.2
          fetch-depth: 0

      - name: Verify branch head
        env:
          EXPECTED_HEAD: ${{ github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"

      - name: Prepare canonical release metadata
        run: |
          set -euo pipefail
          node scripts/prepare-allforone-release.mjs 0.1.0-rc.2 --date 2026-07-19 --json
          node scripts/prepare-allforone-release.mjs 0.1.0-rc.2 --check --json

      - name: Verify generated scope
        run: |
          set -euo pipefail
          git diff --name-only | sort > /tmp/actual-files
          printf '%s\n' \
            CHANGELOG-AFO.md \
            package-lock.json \
            package.json \
            packages/coding-agent/src/allforone/product.ts \
            | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files
          git diff --check

      - name: Commit generated metadata and remove one-time workflow
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/prepare-afo-rc2-once.yml
          git add CHANGELOG-AFO.md package-lock.json package.json packages/coding-agent/src/allforone/product.ts
          git commit -m 'chore: prepare All-For-One 0.1.0-rc.2'
          git push origin HEAD:release/0.1.0-rc.2
