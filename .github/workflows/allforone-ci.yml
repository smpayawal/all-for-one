name: All-For-One CI

on:
  pull_request:
    branches: [allforone]
  push:
    branches: [allforone]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: allforone-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract-compaction-boundary:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'architecture/phase-04-compaction-boundary' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout exact phase head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Move policy behind compaction boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          session_path = Path('packages/coding-agent/src/core/agent-session.ts')
          content = session_path.read_text()

          old_import = '''import {
	assertCompactionResultValid,
	type CompactionHealth,
	type CompactionPreparation,
	type CompactionResult,
	type CompactionTelemetryRecorder,
	CompactionTelemetryStore,
	calculateContextTokens,
	collectCompactionHealth,
	collectEntriesForBranchSummary,
	compactWithTurnPrefixInstructions,
	estimateContextTokens,
	estimateTokens,
	generateBranchSummary,
	getCompactionProviderMetrics,
	prepareCompaction,
	shouldCompact,
	validateCompactionResult,
} from "./compaction/index.ts";
'''
          new_import = '''import {
	type CompactionHealth,
	type CompactionResult,
	CompactionTelemetryStore,
	calculateContextTokens,
	collectCompactionHealth,
	collectEntriesForBranchSummary,
	compactWithValidationAndRepair,
	estimateContextTokens,
	estimateTokens,
	generateBranchSummary,
	getCompactionProviderMetrics,
	prepareCompaction,
	shouldCompact,
} from "./compaction/index.ts";
'''
          if content.count(old_import) != 1:
              raise SystemExit('expected compaction import block not found exactly once')
          content = content.replace(old_import, new_import, 1)

          start_marker = 'const REPAIRABLE_COMPACTION_ISSUES = new Set(['
          end_marker = '// ============================================================================\n// Constants'
          start = content.find(start_marker)
          end = content.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('validated compaction policy block markers not found')
          content = content[:start] + content[end:]

          if 'REPAIRABLE_COMPACTION_ISSUES' in content:
              raise SystemExit('repair policy remained in agent-session.ts')
          if content.count('compactWithValidationAndRepair(') != 1:
              raise SystemExit('expected exactly one imported compaction call to remain')
          session_path.write_text(content)

          index_path = Path('packages/coding-agent/src/core/compaction/index.ts')
          index = index_path.read_text()
          export_line = 'export * from "./validated-compaction.ts";\n'
          if export_line not in index:
              index += export_line
          index_path.write_text(index)
          PY

          git diff --check

      - name: Commit extraction to phase branch
        env:
          PHASE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/coding-agent/src/core/agent-session.ts packages/coding-agent/src/core/compaction/index.ts
          git commit -m "refactor(compaction): isolate validation and repair policy"
          git push origin "HEAD:${PHASE_BRANCH}"

  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          node -e "const { execFileSync } = require('node:child_process'); const expected = process.env.EXPECTED_HEAD; const actual = execFileSync('git', ['rev-parse', 'HEAD'], { encoding: 'utf8' }).trim(); if (actual !== expected) { console.error('Expected ' + expected + ' but checked out ' + actual); process.exit(1); }"

      - name: Verify current allforone base
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin allforone
          if ! git merge-base --is-ancestor origin/allforone HEAD; then
            echo "Pull request head does not contain the current allforone base." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install platform tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Clean-worktree helper tests
        run: node --test scripts/check-clean-worktree.test.mjs

      - name: Session-efficiency report tests
        run: npm exec -- tsx --test scripts/session-efficiency-report.test.ts

      - name: Verify generated build output
        run: node scripts/check-clean-worktree.mjs --allow-build-generated

      - name: Check
        run: npm run check

      - name: Focused coding-agent and All-For-One tests
        run: >-
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run
          test/coding-model-profile.test.ts
          test/sdk-tool-profile.test.ts
          test/native-skills.test.ts
          test/execution-integrity-lazy.test.ts
          test/safe-mode.test.ts
          test/process-tree-windows.test.ts
          test/process-cleanup-failure.test.ts
          test/bash-process-tree.test.ts
          test/code-intel.test.ts
          test/repo-map.test.ts
          test/repo-map-deadline.test.ts
          test/validation-commands.test.ts
          test/validate-extension.test.ts
          test/validate-freshness.test.ts
          test/validate-executable-identity.test.ts
          test/exec.test.ts
          test/allforone-baseline.test.ts
          test/args.test.ts
          test/settings-manager.test.ts
          test/system-prompt.test.ts
          test/tool-registry.test.ts
          test/resource-loader.test.ts
          test/agent-session-concurrent.test.ts
          test/agent-session-runtime-events.test.ts
          test/apply-patch-tool.test.ts
          test/file-mutation-queue.test.ts
          test/scoped-context.test.ts
          test/compaction-health.test.ts
          test/compaction-retention.test.ts
          test/compaction-validation.test.ts
          test/execution-integrity.test.ts
          test/suite/lax-message-content.test.ts
          test/skills.test.ts
          test/memory.test.ts
          test/interactive-mode-status.test.ts
          test/session-rail.test.ts
          test/suite/agent-session-runtime.test.ts
          test/suite/agent-session-bash-persistence.test.ts
          test/suite/regressions/2835-tools-allowlist-filters-extension-tools.test.ts
          test/suite/regressions/3592-no-builtin-tools-keeps-extension-tools.test.ts
          test/suite/regressions/5109-exclude-tools.test.ts

      - name: Focused agent runtime tests
        run: npm --workspace @earendil-works/pi-agent-core exec -- vitest --run test/execution-integrity.test.ts

      - name: Test
        run: npm test

      - name: Offline diagnostics
        run: |
          npm run doctor:allforone -- --json
          npm run baseline:allforone -- --json
          npm run baseline:context -- --json
          npm run baseline:execution -- --json
          npm run evaluate:context -- --help
          npm run evaluate:execution -- --help

      - name: Upstream relationship
        run: node scripts/check-upstream-relationship.mjs --main origin/main --json

      - name: Restore generated catalogs after validation
        run: git restore --worktree -- packages/ai/src/models.generated.ts packages/ai/src/image-models.generated.ts ':(glob)packages/ai/src/providers/*.models.ts'

      - name: Verify clean worktree
        run: node scripts/check-clean-worktree.mjs

  platform-focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          node -e "const { execFileSync } = require('node:child_process'); const expected = process.env.EXPECTED_HEAD; const actual = execFileSync('git', ['rev-parse', 'HEAD'], { encoding: 'utf8' }).trim(); if (actual !== expected) { console.error('Expected ' + expected + ' but checked out ' + actual); process.exit(1); }"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Verify generated build output
        run: node scripts/check-clean-worktree.mjs --allow-build-generated

      - name: Platform-sensitive focused tests
        run: >-
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run
          test/apply-patch-tool.test.ts
          test/file-mutation-queue.test.ts
          test/memory.test.ts
          test/scoped-context.test.ts
          test/path-utils.test.ts
          test/paths.test.ts
          test/resolve-config-value.test.ts
          test/settings-manager.test.ts
          test/native-skills.test.ts
          test/safe-mode.test.ts
          test/process-tree-windows.test.ts
          test/process-cleanup-failure.test.ts
          test/bash-process-tree.test.ts
          test/code-intel.test.ts
          test/repo-map.test.ts
          test/validation-commands.test.ts
          test/validate-extension.test.ts
          test/validate-freshness.test.ts
          test/validate-executable-identity.test.ts
          test/exec.test.ts
          test/bash-close-hang-windows.test.ts
          test/suite/agent-session-bash-persistence.test.ts

      - name: Restore generated catalogs after validation
        run: git restore --worktree -- packages/ai/src/models.generated.ts packages/ai/src/image-models.generated.ts ':(glob)packages/ai/src/providers/*.models.ts'

      - name: Verify clean worktree
        run: node scripts/check-clean-worktree.mjs
