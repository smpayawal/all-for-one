name: All-For-One CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: allforone-diagnostic-${{ github.sha }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          node -e "const { execFileSync } = require('node:child_process'); const expected = process.env.EXPECTED_HEAD; const actual = execFileSync('git', ['rev-parse', 'HEAD'], { encoding: 'utf8' }).trim(); if (actual !== expected) { console.error('Expected ' + expected + ' but checked out ' + actual); process.exit(1); }"

      - name: Verify current main base
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Pull request head does not contain the current main base." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install platform tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Repository helper tests
        run: >-
          node --test
          scripts/check-clean-worktree.test.mjs
          scripts/profile-startup-baseline.test.mjs

      - name: Session-efficiency report tests
        run: npm exec -- tsx --test scripts/session-efficiency-report.test.ts

      - name: Verify generated build output
        run: node scripts/check-clean-worktree.mjs --allow-build-generated

      - name: Check
        run: npm run check

      - name: Diagnose repo-map deadline
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/repo-map-deadline.test.ts

      - name: Diagnose validation commands
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/validation-commands.test.ts

      - name: Diagnose validation extension
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/validate-extension.test.ts

      - name: Diagnose validation freshness
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/validate-freshness.test.ts

      - name: Diagnose validation executable identity
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/validate-executable-identity.test.ts

      - name: Diagnose exec
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/exec.test.ts

      - name: Diagnose All-For-One baseline
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/allforone-baseline.test.ts

      - name: Diagnose product identity
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/product-identity.test.ts

      - name: Diagnose CLI arguments
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/args.test.ts

      - name: Diagnose settings manager
        if: always()
        run: npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/settings-manager.test.ts

      - name: Restore generated catalogs after validation
        if: always()
        run: git restore --worktree -- packages/ai/src/models.generated.ts packages/ai/src/image-models.generated.ts ':(glob)packages/ai/src/providers/*.models.ts'

      - name: Verify clean worktree
        if: always()
        run: node scripts/check-clean-worktree.mjs
