name: All-For-One CI

on:
  pull_request:
    branches: [allforone]
  push:
    branches: [allforone]

permissions:
  contents: read

concurrency:
  group: allforone-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply Biome to Kimi compatibility test
        run: npx biome check --write packages/ai/test/kimi-coding-compat.test.ts

      - name: Upload formatted test
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: biome-formatted-kimi-test
          path: packages/ai/test/kimi-coding-compat.test.ts
          if-no-files-found: error

      - name: Require committed formatting
        run: git diff --exit-code -- packages/ai/test/kimi-coding-compat.test.ts
