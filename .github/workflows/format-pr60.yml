name: Format PR 60 changes

on:
  push:
    branches: [fix/tui-scroll-shell-validation-test]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/tui-scroll-shell-validation-test
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Format touched files
        run: |
          npm exec -- biome check --write \
            packages/coding-agent/src/modes/interactive/components/app-shell.ts \
            packages/coding-agent/src/modes/interactive/components/session-rail.ts \
            packages/coding-agent/test/session-rail-style.test.ts \
            packages/coding-agent/test/session-rail.test.ts \
            packages/coding-agent/test/tui-scroll-regression.test.ts \
            packages/coding-agent/test/validate-extension.test.ts

      - name: Remove temporary formatter
        run: rm .github/workflows/format-pr60.yml

      - name: Commit formatted files
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "style: format TUI regression fixes"
          git push origin HEAD:fix/tui-scroll-shell-validation-test
