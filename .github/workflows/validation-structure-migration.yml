name: Validation Structure Migration

on:
  pull_request:
    branches: [allforone]
    paths:
      - .github/workflows/validation-structure-migration.yml
      - packages/coding-agent/src/core/validation-commands.ts
      - packages/coding-agent/src/extensions/validate/index.ts
      - packages/coding-agent/src/index.ts
      - packages/coding-agent/test/validation-commands.test.ts
      - packages/coding-agent/test/validate-extension.test.ts

permissions:
  contents: write
  actions: read

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.head_ref }}

      - name: Download formatted artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output /tmp/validation-structure-migration.zip \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8427409149/zip"
          rm -rf /tmp/validation-structure-migration
          mkdir -p /tmp/validation-structure-migration
          unzip -q /tmp/validation-structure-migration.zip -d /tmp/validation-structure-migration

      - name: Apply formatted source and tests
        run: |
          cp /tmp/validation-structure-migration/packages/coding-agent/src/core/validation-commands.ts packages/coding-agent/src/core/validation-commands.ts
          cp /tmp/validation-structure-migration/packages/coding-agent/src/extensions/validate/index.ts packages/coding-agent/src/extensions/validate/index.ts
          cp /tmp/validation-structure-migration/packages/coding-agent/src/index.ts packages/coding-agent/src/index.ts
          cp /tmp/validation-structure-migration/packages/coding-agent/test/validation-commands.test.ts packages/coding-agent/test/validation-commands.test.ts
          cp /tmp/validation-structure-migration/packages/coding-agent/test/validate-extension.test.ts packages/coding-agent/test/validate-extension.test.ts
          python - <<'PY'
          from pathlib import Path
          path = Path("packages/coding-agent/src/extensions/validate/index.ts")
          text = path.read_text()
          text = text.replace(
              '`Program: ${record.command.program}`',
              '`Program: ${record.command.program ?? "not available"}`',
          )
          text = text.replace(
              '`Arguments: ${formatArguments(record.command.args)}`',
              '`Arguments: ${formatArguments(record.command.args ?? [])}`',
          )
          path.write_text(text)
          PY

      - name: Commit source and test migration
        run: |
          if git diff --quiet -- packages/coding-agent/src/core/validation-commands.ts packages/coding-agent/src/extensions/validate/index.ts packages/coding-agent/src/index.ts packages/coding-agent/test/validation-commands.test.ts packages/coding-agent/test/validate-extension.test.ts; then
            echo "Formatted migration is already applied."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/coding-agent/src/core/validation-commands.ts packages/coding-agent/src/extensions/validate/index.ts packages/coding-agent/src/index.ts packages/coding-agent/test/validation-commands.test.ts packages/coding-agent/test/validate-extension.test.ts
          git commit --no-verify -m "test(coding-agent): validate structured command execution"
          git push origin HEAD:${{ github.head_ref }}
