name: Apply Resource Loader Expectation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/project-skills'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: feat/project-skills
          fetch-depth: 0

      - name: Update existing loader test and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("packages/coding-agent/test/resource-loader.test.ts")
          content = path.read_text()
          old = '''\t\tit("should load the five native coding skills from the package", async () => {
          \t\t\tconst loader = new DefaultResourceLoader({ cwd, agentDir });
          \t\t\tawait loader.reload();

          \t\t\tconst names = loader
          \t\t\t\t.getSkills()
          \t\t\t\t.skills.filter((skill) => skill.filePath.includes("packages/coding-agent/skills/"))
          \t\t\t\t.map((skill) => skill.name)
          \t\t\t\t.sort();
          \t\t\texpect(names).toEqual([
          \t\t\t\t"plan-complex-change",
          \t\t\t\t"repository-orientation",
          \t\t\t\t"review-diff",
          \t\t\t\t"systematic-debugging",
          \t\t\t\t"verify-before-completion",
          \t\t\t]);
          \t\t});'''
          new = '''\t\tit("should load the six native coding skills from the package", async () => {
          \t\t\tconst loader = new DefaultResourceLoader({ cwd, agentDir });
          \t\t\tawait loader.reload();

          \t\t\tconst names = loader
          \t\t\t\t.getSkills()
          \t\t\t\t.skills.filter((skill) => skill.filePath.includes("packages/coding-agent/skills/"))
          \t\t\t\t.map((skill) => skill.name)
          \t\t\t\t.sort();
          \t\t\texpect(names).toEqual([
          \t\t\t\t"change-review",
          \t\t\t\t"design-complex-change",
          \t\t\t\t"project-bootstrap",
          \t\t\t\t"project-context-maintenance",
          \t\t\t\t"security-boundary-review",
          \t\t\t\t"systematic-debugging",
          \t\t\t]);
          \t\t});'''
          if content.count(old) != 1:
              raise SystemExit("expected native skill assertion was not found exactly once")
          path.write_text(content.replace(old, new))
          Path(".github/workflows/diagnose-focused.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/coding-agent/test/resource-loader.test.ts .github/workflows/diagnose-focused.yml
          git commit -m "test(coding-agent): update resource loader skill inventory"
          git push origin HEAD:feat/project-skills
