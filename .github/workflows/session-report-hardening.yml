name: Session report evidence hardening build

on:
  pull_request:
    branches: [allforone]
    paths:
      - .github/workflows/session-report-hardening.yml
      - .github/scripts/session-report-hardening.py

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout target branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/session-report-evidence-quality

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply evidence-quality hardening
        run: python3 .github/scripts/session-report-hardening.py

      - name: Format focused TypeScript
        run: |
          npx biome format --write \
            scripts/session-efficiency-report.ts \
            scripts/session-efficiency-report.test.ts

      - name: Run focused tests
        shell: bash
        run: |
          set -o pipefail
          npm exec -- tsx --test scripts/session-efficiency-report.test.ts 2>&1 | tee session-report-test.log

      - name: Run repository check
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee session-report-check.log

      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: session-report-hardening-evidence
          path: |
            scripts/session-efficiency-report.ts
            scripts/session-efficiency-report.test.ts
            docs/all-for-one/validation.md
            session-report-test.log
            session-report-check.log
          if-no-files-found: warn
          retention-days: 1

      - name: Commit validated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/session-efficiency-report.ts \
            scripts/session-efficiency-report.test.ts \
            docs/all-for-one/validation.md
          git diff --cached --check
          git commit -m "fix: harden session report evidence quality"
          git push origin HEAD:fix/session-report-evidence-quality
