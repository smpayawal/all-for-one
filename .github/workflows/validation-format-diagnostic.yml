name: Validation format diagnostic

on:
  pull_request:
    branches: [allforone]
    paths:
      - .github/workflows/validation-format-diagnostic.yml
      - packages/coding-agent/src/extensions/validate/index.ts

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format validation source
        run: npx biome check --write packages/coding-agent/src/extensions/validate/index.ts

      - name: Upload formatted source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validation-format
          path: packages/coding-agent/src/extensions/validate/index.ts
          if-no-files-found: error
          retention-days: 1
