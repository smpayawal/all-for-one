name: Run PR 61 fix

on:
  push:
    branches: [fix/tui-alternate-screen-rail-help]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: fix/tui-alternate-screen-rail-help
          fetch-depth: 0

      - name: Extract and run focused patch
        shell: bash
        run: |
          awk '
            /python3 <<.PY./ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-pr61-fix.yml > /tmp/apply-pr61.py
          python3 /tmp/apply-pr61.py

      - name: Commit focused fix and remove helpers
        shell: bash
        run: |
          rm .github/workflows/apply-pr61-fix.yml .github/workflows/run-pr61-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/tui/src/terminal.ts packages/tui/src/index.ts packages/tui/src/tui.ts packages/coding-agent/src/modes/interactive/interactive-mode.ts packages/coding-agent/src/modes/interactive/components/session-rail.ts .github/workflows/apply-pr61-fix.yml .github/workflows/run-pr61-fix.yml
          git commit -m "fix: isolate interactive TUI and restore rail help"
          git push origin HEAD:fix/tui-alternate-screen-rail-help
