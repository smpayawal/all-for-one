name: Diagnose PR 61 Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'fix/tui-alternate-screen-rail-help'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run build

      - name: Capture repository diagnostics after build
        shell: bash
        run: |
          npm exec -- biome check --error-on-warnings --reporter=json . \
            > biome-pr61-build.json || true

      - name: Commit diagnostics and remove temporary files
        run: |
          rm .github/workflows/diagnose-pr61-build.yml
          rm -f .artifacts/biome-pr61.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f biome-pr61-build.json
          git add .github/workflows/diagnose-pr61-build.yml
          git add -u .artifacts/biome-pr61.json
          git commit -m "chore: capture post-build Biome diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
