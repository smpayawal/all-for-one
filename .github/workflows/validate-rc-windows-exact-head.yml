name: Validate RC Windows Exact Head

on:
  pull_request:
    branches:
      - release/0.1.0-rc.1-finalize

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact release head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: 7ab9304e0d307e8d809a8fa10d034e7e011be683
          fetch-depth: 1

      - name: Verify exact release head
        shell: pwsh
        run: |
          if ((git rev-parse HEAD).Trim() -ne '7ab9304e0d307e8d809a8fa10d034e7e011be683') { throw 'Unexpected checkout head' }

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Verify generated build output
        run: node scripts/check-clean-worktree.mjs --allow-build-generated

      - name: Run Windows platform-focused tests
        run: >-
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run
          test/apply-patch-tool.test.ts
          test/file-mutation-queue.test.ts
          test/memory.test.ts
          test/scoped-context.test.ts
          test/path-utils.test.ts
          test/paths.test.ts
          test/resolve-config-value.test.ts
          test/settings-manager.test.ts
          test/native-skills.test.ts
          test/safe-mode.test.ts
          test/process-tree-windows.test.ts
          test/process-cleanup-failure.test.ts
          test/bash-process-tree.test.ts
          test/code-intel.test.ts
          test/repo-map.test.ts
          test/validation-commands.test.ts
          test/validate-extension.test.ts
          test/validate-freshness.test.ts
          test/validate-executable-identity.test.ts
          test/exec.test.ts
          test/bash-close-hang-windows.test.ts
          test/suite/agent-session-bash-persistence.test.ts

      - name: Restore generated catalogs after validation
        run: git restore --worktree -- packages/ai/src/models.generated.ts packages/ai/src/image-models.generated.ts ':(glob)packages/ai/src/providers/*.models.ts'

      - name: Verify clean worktree
        run: node scripts/check-clean-worktree.mjs
