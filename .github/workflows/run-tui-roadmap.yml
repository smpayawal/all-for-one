name: Run TUI roadmap implementation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'perf/tui-responsiveness-roadmap' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: perf/tui-responsiveness-roadmap

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Extract implementation script
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-tui-roadmap.yml').read_text()
          marker = "cat <<'PAYLOAD' | base64 --decode | gzip --decompress > /tmp/apply-tui-roadmap.py\n"
          payload = source.split(marker, 1)[1].split('\n          PAYLOAD', 1)[0]
          Path('/tmp/apply-tui-roadmap.py.gz.b64').write_text(payload.strip() + '\n')
          PY
          base64 --decode /tmp/apply-tui-roadmap.py.gz.b64 | gzip --decompress > /tmp/apply-tui-roadmap.py
          python - <<'PY'
          from pathlib import Path
          import re
          script = Path('/tmp/apply-tui-roadmap.py')
          content = script.read_text()
          content, root_count = re.subn(
              r'^ROOT\s*=.*$',
              'ROOT = __import__("pathlib").Path.cwd()',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          old_test = "run('npm', 'exec', '--', 'vitest', '--run', *tests)"
          new_test = "run('node', 'packages/coding-agent/node_modules/vitest/dist/cli.js', '--run', *[test.removeprefix('packages/coding-agent/') for test in tests])"
          content, test_count = content.replace(old_test, new_test), content.count(old_test)
          old_install = "run('npm', 'ci', '--ignore-scripts')"
          new_install = old_install + "\nrun('npm', 'run', 'build')"
          content, install_count = content.replace(old_install, new_install), content.count(old_install)
          if root_count != 1 or test_count != 1 or install_count != 1:
              raise SystemExit(
                  f'Unable to patch implementation script: root={root_count}, tests={test_count}, install={install_count}'
              )
          script.write_text(content)
          PY
          python -m py_compile /tmp/apply-tui-roadmap.py

      - name: Apply and validate roadmap phases
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          python /tmp/apply-tui-roadmap.py 2>&1 | tee /tmp/tui-roadmap.log

      - name: Prepare failure diagnostics
        if: steps.apply.outcome == 'failure'
        run: |
          mkdir -p /tmp/tui-roadmap-failure
          tail -n 500 /tmp/tui-roadmap.log > /tmp/tui-roadmap-failure/output.log
          cp /tmp/apply-tui-roadmap.py /tmp/tui-roadmap-failure/apply-tui-roadmap.py
          git diff --binary > /tmp/tui-roadmap-failure/changes.patch
          git status --short > /tmp/tui-roadmap-failure/status.txt

      - name: Upload failure diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tui-roadmap-failure
          path: /tmp/tui-roadmap-failure
          if-no-files-found: error

      - name: Fail when implementation failed
        if: steps.apply.outcome == 'failure'
        run: exit 1
