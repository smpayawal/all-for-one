name: Run TUI roadmap implementation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'perf/tui-responsiveness-roadmap' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: perf/tui-responsiveness-roadmap

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Extract remaining implementation phases
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-tui-roadmap.yml').read_text()
          marker = "cat <<'PAYLOAD' | base64 --decode | gzip --decompress > /tmp/apply-tui-roadmap.py\n"
          payload = source.split(marker, 1)[1].split('\n          PAYLOAD', 1)[0]
          Path('/tmp/apply-tui-roadmap.py.gz.b64').write_text(payload.strip() + '\n')
          PY
          base64 --decode /tmp/apply-tui-roadmap.py.gz.b64 | gzip --decompress > /tmp/apply-tui-roadmap.py
          python - <<'PY'
          from pathlib import Path
          import re

          script = Path('/tmp/apply-tui-roadmap.py')
          content = script.read_text()
          content, root_count = re.subn(
              r'^ROOT\s*=.*$',
              'ROOT = __import__("pathlib").Path.cwd()',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          old_test = "run('npm', 'exec', '--', 'vitest', '--run', *tests)"
          new_test = "subprocess.run(['npm', 'run', 'test', '--', *[test.removeprefix('packages/coding-agent/') for test in tests]], cwd=ROOT / 'packages/coding-agent', check=True)"
          test_count = content.count(old_test)
          content = content.replace(old_test, new_test)
          old_install = "run('npm', 'ci', '--ignore-scripts')"
          install_count = content.count(old_install)
          content = content.replace(old_install, old_install + "\nrun('npm', 'run', 'build')")

          phase0_start = content.index('# Phase 0:')
          phase2_start = content.index('# Phase 2:')
          content = content[:phase0_start] + '# Phases 0 and 1 completed and validated.\n\n' + content[phase2_start:]

          lifecycle_pattern = re.compile(
              r'    function formatLifecycle\(lifecycle: SessionRailLifecycle, activeTools: readonly string\[\], width: number\): string \{.*?\n    \}',
              re.S,
          )
          lifecycle_replacement = "\n".join([
              '    function formatLifecycle(lifecycle: SessionRailLifecycle, activeTools: readonly string[], width: number): string {',
              '        let value: string;',
              '        if (lifecycle.kind === "retry") {',
              '            value = theme.fg("warning", `Retrying ${lifecycle.attempt}/${lifecycle.maxAttempts}`);',
              '        } else if (lifecycle.kind === "compaction") {',
              '            value = theme.fg("warning", "Compacting context");',
              '        } else if (activeTools.length > 0) {',
              '            const active = railLine(activeTools[0] ?? "tool", Math.max(1, width - 12));',
              '            value = theme.fg("borderAccent", `Working · ${active}`);',
              '        } else if (lifecycle.kind === "agent") {',
              '            value = theme.fg("borderAccent", "Preparing response");',
              '        } else {',
              '            value = theme.fg("muted", "Idle");',
              '        }',
              '        return indentSectionBody(value, width);',
              '    }',
          ])
          content, lifecycle_count = lifecycle_pattern.subn(lifecycle_replacement, content, count=1)

          if root_count != 1 or test_count != 1 or install_count != 1 or lifecycle_count != 1:
              raise SystemExit(
                  f'Unable to patch implementation script: root={root_count}, tests={test_count}, install={install_count}, lifecycle={lifecycle_count}'
              )
          script.write_text(content)
          PY
          python -m py_compile /tmp/apply-tui-roadmap.py

      - name: Align rail tests with the simplified hierarchy
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/coding-agent/test/session-rail.test.ts')
          content = path.read_text()
          replacements = {
              'import { initTheme, theme } from "../src/modes/interactive/theme/theme.ts";': 'import { initTheme } from "../src/modes/interactive/theme/theme.ts";',
              'expect(output).toContain("read");': 'expect(output).toContain("+1 more active");',
              'expect(output).toContain("× write");': 'expect(output).not.toContain("× write");',
              'expect(output).toContain("—");': 'expect(output).not.toContain("TEST PRODUCT");',
              'expect(screen.some((line) => line.includes("TEST PRODUCT"))).toBe(true);': 'expect(screen.some((line) => line.includes("TEST PRODUCT"))).toBe(false);',
          }
          for old, new in replacements.items():
              if old in content:
                  content = content.replace(old, new, 1)
              elif new not in content:
                  raise SystemExit(f'Missing expected rail assertion: {old}')
          path.write_text(content)
          PY

      - name: Apply and validate remaining phases
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          python /tmp/apply-tui-roadmap.py 2>&1 | tee /tmp/tui-roadmap.log

      - name: Prepare failure diagnostics
        if: steps.apply.outcome == 'failure'
        run: |
          mkdir -p /tmp/tui-roadmap-failure
          tail -n 700 /tmp/tui-roadmap.log > /tmp/tui-roadmap-failure/output.log
          cp /tmp/apply-tui-roadmap.py /tmp/tui-roadmap-failure/apply-tui-roadmap.py
          git diff --binary > /tmp/tui-roadmap-failure/changes.patch
          git status --short > /tmp/tui-roadmap-failure/status.txt

      - name: Upload failure diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tui-roadmap-failure
          path: /tmp/tui-roadmap-failure
          if-no-files-found: error

      - name: Fail when implementation failed
        if: steps.apply.outcome == 'failure'
        run: exit 1
