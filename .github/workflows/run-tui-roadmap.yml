name: Run TUI roadmap implementation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'perf/tui-responsiveness-roadmap' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: perf/tui-responsiveness-roadmap

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Normalize existing formatting blockers
        run: |
          npm exec -- biome check --write \
            packages/coding-agent/src/modes/interactive/components/assistant-message.ts \
            packages/coding-agent/src/modes/interactive/components/inset-panel.ts

      - name: Build
        run: npm run build

      - name: Code quality
        run: npm run check

      - name: Full test suite
        run: npm test

      - name: Verify diff integrity
        run: git diff --check

      - name: Commit validated formatting fixes
        run: |
          if git diff --quiet; then
            echo "No formatting fixes were needed."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/coding-agent/src/modes/interactive/components/assistant-message.ts \
            packages/coding-agent/src/modes/interactive/components/inset-panel.ts
          git diff --cached --check
          git commit -m "style: satisfy repository formatting checks"
          git push origin HEAD:perf/tui-responsiveness-roadmap
