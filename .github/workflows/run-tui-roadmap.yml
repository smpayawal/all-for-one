name: Run TUI roadmap implementation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'perf/tui-responsiveness-roadmap' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: perf/tui-responsiveness-roadmap

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Extract implementation script
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-tui-roadmap.yml').read_text()
          marker = "cat <<'PAYLOAD' | base64 --decode | gzip --decompress > /tmp/apply-tui-roadmap.py\n"
          payload = source.split(marker, 1)[1].split('\n          PAYLOAD', 1)[0]
          Path('/tmp/apply-tui-roadmap.py.gz.b64').write_text(payload.strip() + '\n')
          PY
          base64 --decode /tmp/apply-tui-roadmap.py.gz.b64 | gzip --decompress > /tmp/apply-tui-roadmap.py
          python - <<'PY'
          from pathlib import Path
          import re
          script = Path('/tmp/apply-tui-roadmap.py')
          content = script.read_text()
          content, root_count = re.subn(
              r'^ROOT\s*=.*$',
              'ROOT = __import__("pathlib").Path.cwd()',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          old_test = "run('npm', 'exec', '--', 'vitest', '--run', *tests)"
          new_test = "subprocess.run(['npm', 'run', 'test', '--', *[test.removeprefix('packages/coding-agent/') for test in tests]], cwd=ROOT / 'packages/coding-agent', check=True)"
          content, test_count = content.replace(old_test, new_test), content.count(old_test)
          old_install = "run('npm', 'ci', '--ignore-scripts')"
          new_install = old_install + "\nrun('npm', 'run', 'build')"
          content, install_count = content.replace(old_install, new_install), content.count(old_install)
          old_format = "    'packages/coding-agent/src/modes/interactive/transcript-viewport.ts',\n)"
          new_format = "    'packages/coding-agent/src/modes/interactive/transcript-viewport.ts',\n    'packages/coding-agent/test/transcript-viewport.test.ts',\n)"
          content, format_count = content.replace(old_format, new_format, 1), content.count(old_format)

          phase0_start = content.index('# Phase 0:')
          phase1_start = content.index('# Phase 1:')
          content = content[:phase0_start] + '# Phase 0 completed in da8d363d.\n\n' + content[phase1_start:]

          toggle_start = content.index(
              "replace_once(\n    'packages/coding-agent/src/modes/interactive/interactive-mode.ts',\n    '\\t\\tthis.toolOutputExpanded"
          )
          tests_start = content.index(
              "replace_once(\n    'packages/coding-agent/test/transcript-viewport.test.ts',",
              toggle_start,
          )
          content = content[:toggle_start] + content[tests_start:]

          content = content.replace(
              '                this.bashComponent === undefined,\n',
              '                this.bashComponent === undefined &&\n'
              '                !this.toolOutputExpanded &&\n'
              '                !this.hideThinkingBlock,\n',
              1,
          )
          content = content.replace(
              '        private contentDirty = true;\n',
              '        private contentDirty = true;\n        private lastReuseContent = false;\n',
              1,
          )
          content = content.replace(
              '            const cacheHit =\n'
              '                this.cachedLines !== undefined && !this.contentDirty && !widthChanged && this.reuseContent();\n',
              '            const reuseContent = this.reuseContent();\n'
              '            const reuseBecameActive = reuseContent && !this.lastReuseContent;\n'
              '            const cacheHit =\n'
              '                this.cachedLines !== undefined &&\n'
              '                !this.contentDirty &&\n'
              '                !widthChanged &&\n'
              '                reuseContent &&\n'
              '                !reuseBecameActive;\n',
              1,
          )
          content = content.replace(
              '                this.contentDirty = false;\n            }\n\n            this.state = reduceTranscriptViewportState',
              '                this.contentDirty = false;\n            }\n            this.lastReuseContent = reuseContent;\n\n            this.state = reduceTranscriptViewportState',
              1,
          )
          content = content.replace(
              '            this.contentDirty = true;\n        }\n\n        private apply',
              '            this.contentDirty = true;\n            this.lastReuseContent = false;\n        }\n\n        private apply',
              1,
          )

          if root_count != 1 or test_count != 1 or install_count != 1 or format_count < 1:
              raise SystemExit(
                  f'Unable to patch implementation script: root={root_count}, tests={test_count}, install={install_count}, format={format_count}'
              )
          script.write_text(content)
          PY
          python -m py_compile /tmp/apply-tui-roadmap.py

      - name: Normalize terminal-cell assertions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/coding-agent/test/transcript-viewport.test.ts')
          content = path.read_text()
          replacements = {
              'expect(screen.slice(0, 6)).toEqual([': 'expect(screen.slice(0, 6).map((line) => line.trimEnd())).toEqual([',
              'expect(screen[0]).toBe("row 11");': 'expect(screen[0]?.trimEnd()).toBe("row 11");',
          }
          for old, new in replacements.items():
              if old in content:
                  content = content.replace(old, new, 1)
              elif new not in content:
                  raise SystemExit(f'Missing expected assertion: {old}')
          path.write_text(content)
          PY

      - name: Apply and validate roadmap phases
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          python /tmp/apply-tui-roadmap.py 2>&1 | tee /tmp/tui-roadmap.log

      - name: Prepare failure diagnostics
        if: steps.apply.outcome == 'failure'
        run: |
          mkdir -p /tmp/tui-roadmap-failure
          tail -n 500 /tmp/tui-roadmap.log > /tmp/tui-roadmap-failure/output.log
          cp /tmp/apply-tui-roadmap.py /tmp/tui-roadmap-failure/apply-tui-roadmap.py
          git diff --binary > /tmp/tui-roadmap-failure/changes.patch
          git status --short > /tmp/tui-roadmap-failure/status.txt

      - name: Upload failure diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tui-roadmap-failure
          path: /tmp/tui-roadmap-failure
          if-no-files-found: error

      - name: Fail when implementation failed
        if: steps.apply.outcome == 'failure'
        run: exit 1
