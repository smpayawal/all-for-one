name: Phase 2 release normalization

on:
  push:
    branches: [product/phase-02-release-identity]

permissions:
  contents: write

concurrency:
  group: phase-02-release-normalize
  cancel-in-progress: true

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout phase branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: product/phase-02-release-identity
          fetch-depth: 0

      - name: Apply exact release maintenance edits
        run: |
          python - <<'PY'
          from pathlib import Path

          local_release = Path('scripts/local-release.mjs')
          content = local_release.read_text()
          old = 'if (rootPackageJson.name !== "pi-monorepo") {'
          new = 'if (!["pi-monorepo", "all-for-one-monorepo"].includes(rootPackageJson.name)) {'
          if old not in content:
              raise SystemExit('local-release root guard not found')
          local_release.write_text(content.replace(old, new, 1))

          release_script = Path('scripts/allforone-release.mjs')
          content = release_script.read_text()
          old = 'assets: [...RELEASE_ASSETS, "SHA256SUMS", "RELEASE_NOTES.md"],'
          new = 'assets: [...RELEASE_ASSETS, "release-manifest.json", "SHA256SUMS", "RELEASE_NOTES.md"],'
          if old not in content:
              raise SystemExit('release manifest asset list not found')
          release_script.write_text(content.replace(old, new, 1))
          PY

          chmod +x scripts/build-allforone-binaries.sh scripts/allforone-release.mjs
          git update-index --chmod=+x scripts/build-allforone-binaries.sh scripts/allforone-release.mjs
          git diff --check

      - name: Commit normalized release files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/local-release.mjs scripts/allforone-release.mjs scripts/build-allforone-binaries.sh
          git commit -m "fix(release): preserve local release compatibility"
          git push origin HEAD:product/phase-02-release-identity
