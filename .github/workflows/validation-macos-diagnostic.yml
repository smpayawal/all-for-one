name: Validation macOS Diagnostic

on:
  pull_request:
    branches: [allforone]
    paths:
      - .github/workflows/validation-macos-diagnostic.yml
      - packages/coding-agent/src/core/validation-commands.ts
      - packages/coding-agent/src/extensions/validate/index.ts
      - packages/coding-agent/test/validation-commands.test.ts
      - packages/coding-agent/test/validate-extension.test.ts

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run validation tests
        shell: bash
        run: |
          set -o pipefail
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/validation-commands.test.ts test/validate-extension.test.ts 2>&1 | tee validation-macos.log

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validation-macos-output
          path: validation-macos.log
          if-no-files-found: error
          retention-days: 1
