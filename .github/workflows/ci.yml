name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-source-export-${{ github.sha }}
  cancel-in-progress: false

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Upload source files for branch-only repair
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compaction-source
          path: |
            packages/coding-agent/src/core/compaction/compaction.ts
            packages/coding-agent/test/suite/regressions/6647-compaction-retries-transient-stream-drop.test.ts
          if-no-files-found: error
          retention-days: 1
