name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-coding-agent-diagnostic-${{ github.sha }}
  cancel-in-progress: false

jobs:
  coding-agent-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Diagnose coding-agent full suite
        shell: bash
        run: |
          set +e
          npm --workspace packages/coding-agent exec -- vitest --run --reporter=json --outputFile=/tmp/coding-agent-results.json
          status=$?
          set -e
          RESULT_FILE=/tmp/coding-agent-results.json node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          const result = JSON.parse(readFileSync(process.env.RESULT_FILE, 'utf8'));
          console.log(`Test files: ${result.numPassedTestSuites ?? 0} passed, ${result.numFailedTestSuites ?? 0} failed`);
          console.log(`Tests: ${result.numPassedTests ?? 0} passed, ${result.numFailedTests ?? 0} failed`);
          for (const file of result.testResults ?? []) {
            const failures = (file.assertionResults ?? []).filter((test) => test.status === 'failed');
            if (file.status !== 'failed' && failures.length === 0) continue;
            console.log(`\nFAILED FILE: ${file.name}`);
            for (const test of failures) {
              console.log(`- ${test.fullName ?? test.title}`);
              for (const message of test.failureMessages ?? []) console.log(message);
            }
            if (failures.length === 0 && file.message) console.log(file.message);
          }
          NODE
          exit "$status"
