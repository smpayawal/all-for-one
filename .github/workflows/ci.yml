name: Apply Compaction CI Repair

on:
  push:
    branches: [agent/fix-main-ci-after-pi-merge]

permissions:
  contents: write

jobs:
  apply-repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: agent/fix-main-ci-after-pi-merge
          fetch-depth: 0

      - name: Apply cancellation guard and restore CI
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('packages/coding-agent/src/core/compaction/compaction.ts')
          text = path.read_text()
          old = '\t\tassertTurnPrefixSummaryValid(turnPrefixResult.text);'
          new = '\t\tif (!signal?.aborted) assertTurnPrefixSummaryValid(turnPrefixResult.text);'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one turn-prefix assertion, found {text.count(old)}')
          text = text.replace(old, new, 1)

          old = '''\t\tsummary = result.text;
          \t\tsummaryUsage = result.usage;
          \t}
          
          \tconst summaryForValidation = summary;
          '''
          new = '''\t\tsummary = result.text;
          \t\tsummaryUsage = result.usage;
          \t}
          
          \t// Cancellation is handled by the session caller before persistence. Keep the
          \t// intermediate result structurally valid so repair validation cannot mask it.
          \tif (signal?.aborted) summary = createStructuredSplitTurnHistoryFallback(previousSummary);
          
          \tconst summaryForValidation = summary;
          '''
          if text.count(old) != 1:
              raise SystemExit(f'Expected one summary validation boundary, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
          git fetch --no-tags origin main
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Commit branch repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/coding-agent/src/core/compaction/compaction.ts .github/workflows/ci.yml
          git commit -m "fix(compaction): preserve cancellation through validation"
          git push origin HEAD:agent/fix-main-ci-after-pi-merge
