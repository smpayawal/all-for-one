name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-diagnostic-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-check-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check publication policy
        run: npm run check:publication-policy

      - name: Check formatting and linting
        run: npm exec -- biome check --error-on-warnings .

      - name: Check pinned dependencies
        run: npm run check:pinned-deps

      - name: Check TypeScript imports
        run: npm run check:ts-imports

      - name: Check coding-agent shrinkwrap
        run: npm run check:shrinkwrap

      - name: Check coding-agent install lock
        run: npm run check:install-lock:coding-agent

      - name: Check TypeScript
        run: npm exec -- tsgo --noEmit

      - name: Check browser smoke configuration
        run: npm run check:browser-smoke

      - name: Test TUI workspace
        run: npm test --workspace packages/tui --if-present

      - name: Test AI workspace
        if: always()
        run: npm test --workspace packages/ai --if-present

      - name: Test agent workspace
        if: always()
        run: npm test --workspace packages/agent --if-present

      - name: Test SQLite workspace
        if: always()
        run: npm test --workspace packages/storage/sqlite-node --if-present

      - name: Test coding-agent workspace
        if: always()
        run: npm test --workspace packages/coding-agent --if-present

      - name: Test server workspace
        if: always()
        run: npm test --workspace packages/server --if-present

      - name: Test remaining workspaces
        if: always()
        run: |
          node --input-type=module <<'NODE'
          import { spawnSync } from 'node:child_process';
          const covered = new Set([
            'packages/tui',
            'packages/ai',
            'packages/agent',
            'packages/storage/sqlite-node',
            'packages/coding-agent',
            'packages/server',
          ]);
          const query = spawnSync('npm', ['query', '.workspace'], { encoding: 'utf8' });
          if (query.status !== 0) {
            process.stderr.write(query.stderr);
            process.exit(query.status ?? 1);
          }
          const workspaces = JSON.parse(query.stdout);
          let failed = false;
          for (const workspace of workspaces) {
            const location = workspace.location?.replaceAll('\\', '/');
            if (!location || covered.has(location) || !workspace.scripts?.test) continue;
            console.log(`\n=== Testing ${workspace.name} (${location}) ===`);
            const result = spawnSync('npm', ['test', '--workspace', location, '--if-present'], {
              stdio: 'inherit',
            });
            if (result.status !== 0) failed = true;
          }
          process.exit(failed ? 1 : 0);
          NODE
