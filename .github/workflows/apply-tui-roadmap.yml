name: Apply TUI responsiveness roadmap

on:
  push:
    branches: [perf/tui-responsiveness-roadmap]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: perf/tui-responsiveness-roadmap

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Apply and validate roadmap phases
        shell: bash
        run: |
          cat <<'PAYLOAD' | base64 --decode | gzip --decompress > /tmp/apply-tui-roadmap.py
          
          PAYLOAD
          python /tmp/apply-tui-roadmap.py
