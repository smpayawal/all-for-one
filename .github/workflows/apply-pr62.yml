name: Apply PR 62

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/tui-resume-render-state'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Apply focused implementation
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if text.count(old) != 1:
                  raise SystemExit(f"Expected one match in {path}, found {text.count(old)}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "packages/tui/src/terminal.ts",
              '''\t// Stop the terminal and restore state
          \tstop(): void;

          \t/**
          \t * Drain stdin before exiting to prevent Kitty key release events from
          ''',
              '''\t// Stop the terminal and restore state
          \tstop(): void;

          \t/**
          \t * Return true once when start() recreated or reset the visible screen buffer.
          \t * Differential renderers must discard their previous physical-frame state.
          \t */
          \tconsumeScreenReset?(): boolean;

          \t/**
          \t * Drain stdin before exiting to prevent Kitty key release events from
          ''',
          )

          replace_once(
              "packages/tui/src/application-terminal.ts",
              '''export class ProcessTerminal extends InlineProcessTerminal {
          \tprivate alternateScreenActive = false;

          \tenterAlternateScreen(): void {
          ''',
              '''export class ProcessTerminal extends InlineProcessTerminal {
          \tprivate alternateScreenActive = false;
          \tprivate screenResetPending = false;

          \tenterAlternateScreen(): void {
          ''',
          )
          replace_once(
              "packages/tui/src/application-terminal.ts",
              '''\t\tthis.write(ALTERNATE_SCREEN_ENTER_SEQUENCE);
          \t\tthis.alternateScreenActive = true;
          \t}

          \texitAlternateScreen(): void {
          ''',
              '''\t\tthis.write(ALTERNATE_SCREEN_ENTER_SEQUENCE);
          \t\tthis.alternateScreenActive = true;
          \t\tthis.screenResetPending = true;
          \t}

          \tconsumeScreenReset(): boolean {
          \t\tconst pending = this.screenResetPending;
          \t\tthis.screenResetPending = false;
          \t\treturn pending;
          \t}

          \texitAlternateScreen(): void {
          ''',
          )

          replace_once(
              "packages/tui/src/tui.ts",
              '''\t\tthis.queryCellSize();
          \t\tthis.requestRender();
          \t}

          \taddInputListener(listener: InputListener): () => void {
          ''',
              '''\t\tthis.queryCellSize();
          \t\tthis.requestRender(this.terminal.consumeScreenReset?.() ?? false);
          \t}

          \taddInputListener(listener: InputListener): () => void {
          ''',
          )

          replace_once(
              "packages/coding-agent/src/modes/interactive/components/session-rail.ts",
              '''function createShortcutSection(summary: string | undefined, width: number): string[] {
          \tif (!summary) return [];
          \tconst shortcuts = summary
          \t\t.split(/\\s*·\\s*/u)
          \t\t.map(sanitize)
          \t\t.filter(Boolean);
          \treturn shortcuts.length > 0 ? createSection("SHORTCUTS", shortcuts, width) : [];
          }
          ''',
              '''function formatShortcut(shortcut: string, width: number): string {
          \tconst match = shortcut.match(/^(.+?)\\s+—\\s+(.+)$/u);
          \tif (!match) return indentSectionBody(theme.fg("muted", railLine(shortcut, width)), width);
          \tconst [, key, action] = match;
          \tconst content = `${theme.bold(theme.fg("accent", key!))}${theme.fg("dim", " — ")}${theme.fg("muted", action!)}`;
          \treturn indentSectionBody(content, width);
          }

          function createShortcutSection(summary: string | undefined, width: number): string[] {
          \tif (!summary) return [];
          \tconst shortcuts = summary
          \t\t.split(/\\s*·\\s*/u)
          \t\t.map(sanitize)
          \t\t.filter(Boolean);
          \treturn shortcuts.length > 0
          \t\t? [sectionTitle("SHORTCUTS"), ...shortcuts.map((shortcut) => formatShortcut(shortcut, width))]
          \t\t: [];
          }
          ''',
          )

          replace_once(
              "packages/coding-agent/src/modes/interactive/interactive-mode.ts",
              '''\tprivate getSessionRailShortcutSummary(): string {
          \t\treturn [
          \t\t\t`${keyText("app.interrupt")} interrupt`,
          \t\t\t`${keyText("app.clear")}/${keyText("app.exit")} clear/exit`,
          \t\t\t"/ commands",
          \t\t\t"! bash",
          \t\t\t`${keyText("app.tools.expand")} more`,
          \t\t].join(" · ");
          \t}
          ''',
              '''\tprivate getSessionRailShortcutSummary(): string {
          \t\tconst displayKey = (keybinding: AppKeybinding): string =>
          \t\t\tkeyDisplayText(keybinding).replace(/\\bEscape\\b/gu, "Esc");
          \t\treturn [
          \t\t\t`${displayKey("app.interrupt")} — Interrupt`,
          \t\t\t`${displayKey("app.clear")} / ${displayKey("app.exit")} — Clear / Exit`,
          \t\t\t"/ — Command",
          \t\t\t"! — Bash",
          \t\t\t`${displayKey("app.tools.expand")} — More`,
          \t\t].join(" · ");
          \t}
          ''',
          )

          replace_once(
              "packages/tui/test/process-terminal-screen-mode.test.ts",
              '''\tit("enters and exits the alternate screen exactly once when enabled", () => {
          ''',
              '''\tit("enters and exits the alternate screen idempotently when enabled", () => {
          ''',
          )
          replace_once(
              "packages/tui/test/process-terminal-screen-mode.test.ts",
              '''\t\t\tterminal.enterAlternateScreen();
          \t\t\tterminal.enterAlternateScreen();
          \t\t\tterminal.exitAlternateScreen();
          \t\t\tterminal.exitAlternateScreen();

          \t\t\tassert.deepEqual(writes, ["\\x1b[?1049h", "\\x1b[?1049l"]);
          ''',
              '''\t\t\tterminal.enterAlternateScreen();
          \t\t\tterminal.enterAlternateScreen();
          \t\t\tassert.equal(terminal.consumeScreenReset(), true);
          \t\t\tassert.equal(terminal.consumeScreenReset(), false);
          \t\t\tterminal.exitAlternateScreen();
          \t\t\tterminal.exitAlternateScreen();
          \t\t\tterminal.enterAlternateScreen();
          \t\t\tassert.equal(terminal.consumeScreenReset(), true);
          \t\t\tterminal.exitAlternateScreen();

          \t\t\tassert.deepEqual(writes, ["\\x1b[?1049h", "\\x1b[?1049l", "\\x1b[?1049h", "\\x1b[?1049l"]);
          ''',
          )
          replace_once(
              "packages/tui/test/process-terminal-screen-mode.test.ts",
              '''\t\t\tterminal.enterAlternateScreen();
          \t\t\tterminal.exitAlternateScreen();

          \t\t\tassert.deepEqual(writes, []);
          ''',
              '''\t\t\tterminal.enterAlternateScreen();
          \t\t\tterminal.exitAlternateScreen();

          \t\t\tassert.equal(terminal.consumeScreenReset(), false);
          \t\t\tassert.deepEqual(writes, []);
          ''',
          )
          PY

          rm -f .github/workflows/red-pr62.yml .github/workflows/apply-pr62.yml

      - run: npm ci --ignore-scripts

      - name: Format and lint touched files
        run: >-
          npm exec -- biome check --write
          packages/tui/src/terminal.ts
          packages/tui/src/application-terminal.ts
          packages/tui/src/tui.ts
          packages/tui/test/process-terminal-screen-mode.test.ts
          packages/coding-agent/src/modes/interactive/interactive-mode.ts
          packages/coding-agent/src/modes/interactive/components/session-rail.ts
          packages/coding-agent/test/tui-scroll-regression.test.ts
          packages/coding-agent/test/session-rail-style.test.ts

      - name: Focused validation
        run: |
          node --test packages/tui/test/process-terminal-screen-mode.test.ts
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run test/tui-scroll-regression.test.ts test/session-rail-style.test.ts
          npm run check

      - name: Commit implementation and remove helpers
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/tui/src/terminal.ts packages/tui/src/application-terminal.ts packages/tui/src/tui.ts packages/tui/test/process-terminal-screen-mode.test.ts packages/coding-agent/src/modes/interactive/interactive-mode.ts packages/coding-agent/src/modes/interactive/components/session-rail.ts packages/coding-agent/test/tui-scroll-regression.test.ts packages/coding-agent/test/session-rail-style.test.ts .github/workflows/red-pr62.yml .github/workflows/apply-pr62.yml
          git commit -m "fix(tui): reset differential state after screen recreation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
