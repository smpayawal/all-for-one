name: Phase 2 release hardening

on:
  push:
    branches: [product/phase-02-release-identity]

permissions:
  contents: write

concurrency:
  group: phase-02-release-hardening
  cancel-in-progress: true

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout phase branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: product/phase-02-release-identity
          fetch-depth: 0

      - name: Apply release workflow hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/allforone-release.yml')
          content = path.read_text()

          old = '''          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            version="$(node -p "require('./package.json').version")"
            release_tag="afo-v${version}"
            source_sha="$(git rev-parse HEAD)"
          else
            release_tag="${INPUT_TAG:-${REF_NAME}}"
            git fetch --no-tags origin allforone
            git fetch --tags origin
            source_sha="$(git rev-list -n 1 "${release_tag}")"
            test "$(git rev-parse HEAD)" = "${source_sha}"
            git merge-base --is-ancestor "${source_sha}" origin/allforone
          fi

          node scripts/allforone-release.mjs validate --tag "${release_tag}" --json
'''
          new = '''          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            version="$(node -p "require('./package.json').version")"
            release_tag="afo-v${version}"
            source_sha="$(git rev-parse HEAD)"
          else
            release_tag="${INPUT_TAG:-${REF_NAME}}"
          fi

          node scripts/allforone-release.mjs validate --tag "${release_tag}" --json

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            git fetch --no-tags origin allforone
            git fetch --tags origin
            source_sha="$(git rev-list -n 1 -- "${release_tag}")"
            test "$(git rev-parse HEAD)" = "${source_sha}"
            git merge-base --is-ancestor "${source_sha}" origin/allforone
          fi
'''
          if old not in content:
              raise SystemExit('release source block not found')
          content = content.replace(old, new, 1)

          old = '''          bash scripts/build-allforone-binaries.sh \\
            --skip-install \\
            --skip-build \\
            --platform linux-x64 \\
            --out .artifacts/allforone-release-smoke

          test -f .artifacts/allforone-release-smoke/all-for-one-linux-x64.tar.gz
          test -x .artifacts/allforone-release-smoke/linux-x64/allforone
'''
          new = '''          bash scripts/build-allforone-binaries.sh \\
            --skip-install \\
            --skip-build \\
            --out .artifacts/allforone-release-smoke

          expected_archives=(
            all-for-one-darwin-arm64.tar.gz
            all-for-one-darwin-x64.tar.gz
            all-for-one-linux-arm64.tar.gz
            all-for-one-linux-x64.tar.gz
            all-for-one-windows-arm64.zip
            all-for-one-windows-x64.zip
          )
          for archive in "${expected_archives[@]}"; do
            test -f ".artifacts/allforone-release-smoke/${archive}"
          done
          test -x .artifacts/allforone-release-smoke/linux-x64/allforone
'''
          if old not in content:
              raise SystemExit('release smoke block not found')
          content = content.replace(old, new, 1)

          old = '''    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
    steps:
      - name: Download release payload
'''
          new = '''    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
      SOURCE_SHA: ${{ needs.validate.outputs.source_sha }}
    steps:
      - name: Checkout verified release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag remains pinned
        run: test "$(git rev-list -n 1 -- "${RELEASE_TAG}")" = "${SOURCE_SHA}"

      - name: Download release payload
'''
          if old not in content:
              raise SystemExit('publish job header not found')
          content = content.replace(old, new, 1)

          path.write_text(content)
          PY

          git diff --check

      - name: Commit hardened release workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/allforone-release.yml
          git commit -m "fix(release): harden tag and artifact validation"
          git push origin HEAD:product/phase-02-release-identity
