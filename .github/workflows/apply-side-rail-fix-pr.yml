name: Run side rail fix validation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/fix-side-rail-skill-state'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check whether the direct patch is ready
        id: gate
        run: |
          last_message=$(git log -1 --pretty=%s)
          if [ -f .github/apply-side-rail-fix.py ] && [ "$last_message" != "chore: save side rail apply failure" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Write regression tests
        if: steps.gate.outputs.run == 'true'
        run: python .github/apply-side-rail-fix.py write-tests

      - name: Verify the regression tests fail before the fix
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          npx vitest --run packages/coding-agent/test/session-rail-skill-state.test.ts > /tmp/side-rail-red.txt 2>&1
          status=$?
          set -e
          cat /tmp/side-rail-red.txt
          if [ "$status" -eq 0 ]; then
            echo "Regression tests unexpectedly passed before the implementation."
            exit 1
          fi
          if grep -E "Cannot find package|Failed to load url|Transform failed|SyntaxError" /tmp/side-rail-red.txt; then
            echo "Regression tests failed because of an infrastructure or syntax problem."
            exit 1
          fi

      - name: Apply the focused implementation
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          python .github/apply-side-rail-fix.py apply > .github/side-rail-apply-error.txt 2>&1
          status=$?
          set -e
          cat .github/side-rail-apply-error.txt
          if [ "$status" -ne 0 ]; then
            git config user.name "All-For-One Automation"
            git config user.email "actions@users.noreply.github.com"
            git add .github/side-rail-apply-error.txt
            git commit -m "chore: save side rail apply failure"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

      - name: Format changed files
        if: steps.gate.outputs.run == 'true'
        run: |
          npx biome check --write \
            packages/coding-agent/src/modes/interactive/interactive-mode.ts \
            packages/coding-agent/src/modes/interactive/components/session-rail.ts \
            packages/coding-agent/test/session-rail-skill-state.test.ts \
            packages/coding-agent/test/session-rail.test.ts \
            packages/coding-agent/test/session-rail-enhancement.test.ts \
            packages/coding-agent/test/session-rail-style.test.ts

      - name: Run focused Side Rail tests
        if: steps.gate.outputs.run == 'true'
        run: |
          npx vitest --run \
            packages/coding-agent/test/session-rail-skill-state.test.ts \
            packages/coding-agent/test/session-rail.test.ts \
            packages/coding-agent/test/session-rail-enhancement.test.ts \
            packages/coding-agent/test/session-rail-style.test.ts

      - name: Run coding-agent tests
        if: steps.gate.outputs.run == 'true'
        run: npm --prefix packages/coding-agent test

      - name: Run repository checks
        if: steps.gate.outputs.run == 'true'
        run: npm run check

      - name: Commit the validated fix
        if: steps.gate.outputs.run == 'true'
        run: |
          rm -f \
            .github/apply-side-rail-fix.py \
            .github/side-rail-apply-error.txt \
            .github/side-rail-validation.txt \
            .github/workflows/apply-side-rail-fix.yml \
            .github/workflows/apply-side-rail-fix-pr.yml
          git config user.name "All-For-One Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix side rail skill state"
          git push origin HEAD:${{ github.head_ref }}
