name: Run side rail fix validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/fix-side-rail-skill-state'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Check whether the prepared change is still pending
        id: gate
        run: |
          last_message=$(git log -1 --pretty=%s)
          if [ -f .github/workflows/apply-side-rail-fix.yml ] && [ "$last_message" != "chore: save side rail validation failure" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Execute the prepared test-first change
        if: steps.gate.outputs.run == 'true'
        run: |
          python <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-side-rail-fix.yml').read_text(encoding='utf-8').splitlines()
          blocks: list[str] = []
          index = 0
          while index < len(source):
              if source[index] != '        run: |':
                  index += 1
                  continue
              index += 1
              block: list[str] = []
              while index < len(source):
                  line = source[index]
                  if line and not line.startswith('          '):
                      break
                  block.append(line[10:] if line.startswith('          ') else '')
                  index += 1
              blocks.append('\n'.join(block))
          if not blocks:
              raise SystemExit('No run blocks found in prepared workflow')

          script = '\n\n'.join(blocks) + '\n'
          marker = "'explicit skill tracking'"
          marker_index = script.index(marker)
          block_start = script.rfind('interactive = replace_once(', 0, marker_index)
          block_end = script.find('interactive = replace_once(', marker_index + len(marker))
          if block_start < 0 or block_end < 0:
              raise SystemExit('Could not locate explicit skill tracking patch block')
          replacement = '''interactive = replace_once(
              interactive,
              '\\t\\t\\t\\tthis.liveExecutionGroup = undefined;\\n\\t\\t\\t\\tthis.ensureLiveTranscriptTurn("user");',
              '\\t\\t\\t\\tthis.liveExecutionGroup = undefined;\\n\\t\\t\\t\\tthis.recordSessionRailSkillMessage(event.message);\\n\\t\\t\\t\\tthis.ensureLiveTranscriptTurn("user");',
              'explicit skill tracking',
          )

          '''
          script = script[:block_start] + replacement + script[block_end:]
          Path('/tmp/apply-side-rail-fix.sh').write_text(script, encoding='utf-8')
          PY
          set +e
          bash /tmp/apply-side-rail-fix.sh > .github/side-rail-validation.txt 2>&1
          status=$?
          set -e
          cat .github/side-rail-validation.txt
          if [ "$status" -ne 0 ]; then
            git config user.name "All-For-One Automation"
            git config user.email "actions@users.noreply.github.com"
            git add .github/side-rail-validation.txt
            git commit -m "chore: save side rail validation failure"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

      - name: Remove temporary validation files
        if: steps.gate.outputs.run == 'true'
        run: |
          rm -f .github/workflows/apply-side-rail-fix-pr.yml .github/side-rail-validation.txt
          git config user.name "All-For-One Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- .github/workflows/apply-side-rail-fix-pr.yml .github/side-rail-validation.txt
          git commit -m "chore remove temporary validation workflow"
          git push origin HEAD:${{ github.head_ref }}
