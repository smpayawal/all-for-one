name: Run side rail fix validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/fix-side-rail-skill-state'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Execute the prepared test-first change
        run: |
          ruby -ryaml -e 'workflow = YAML.load_file(".github/workflows/apply-side-rail-fix.yml"); puts workflow.fetch("jobs").fetch("apply-fix").fetch("steps").filter_map { |step| step["run"] }.join("\n")' > /tmp/apply-side-rail-fix.sh
          bash /tmp/apply-side-rail-fix.sh

      - name: Remove the temporary PR trigger
        run: |
          rm .github/workflows/apply-side-rail-fix-pr.yml
          git config user.name "All-For-One Automation"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/apply-side-rail-fix-pr.yml
          git commit -m "chore remove temporary validation workflow"
          git push origin HEAD:${{ github.head_ref }}
