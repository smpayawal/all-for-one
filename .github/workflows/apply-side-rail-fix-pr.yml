name: Run side rail fix validation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/fix-side-rail-skill-state'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check whether the isolated patch is ready
        id: gate
        run: |
          if [ -f .github/apply-side-rail-fix-v4.py ] && [ -f .github/write-side-rail-tests-v3.py ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install system dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Write regression tests
        if: steps.gate.outputs.run == 'true'
        run: python .github/write-side-rail-tests-v3.py

      - name: Verify the regression tests fail before the fix
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          npm --prefix packages/coding-agent test -- test/session-rail-skill-state.test.ts > /tmp/side-rail-red.txt 2>&1
          status=$?
          set -e
          cat /tmp/side-rail-red.txt
          if [ "$status" -eq 0 ]; then
            echo "Regression tests unexpectedly passed before the implementation."
            exit 1
          fi
          if grep -E "Cannot find package|Transform failed|SyntaxError" /tmp/side-rail-red.txt; then
            echo "Regression tests failed because of an infrastructure or syntax problem."
            exit 1
          fi

      - name: Apply the focused implementation
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          python .github/apply-side-rail-fix-v4.py > /tmp/side-rail-apply-error.txt 2>&1
          status=$?
          set -e
          cat /tmp/side-rail-apply-error.txt
          exit "$status"

      - name: Upload patch diagnostics
        if: failure() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: side-rail-apply-error
          path: /tmp/side-rail-apply-error.txt
          if-no-files-found: ignore

      - name: Format changed files
        if: steps.gate.outputs.run == 'true' && success()
        run: |
          npx biome check --write \
            packages/coding-agent/src/modes/interactive/interactive-mode.ts \
            packages/coding-agent/src/modes/interactive/session-rail-state.ts \
            packages/coding-agent/src/modes/interactive/components/session-rail.ts \
            packages/coding-agent/test/session-rail-skill-state.test.ts \
            packages/coding-agent/test/session-rail.test.ts \
            packages/coding-agent/test/session-rail-enhancement.test.ts \
            packages/coding-agent/test/session-rail-style.test.ts

      - name: Run focused Side Rail tests
        if: steps.gate.outputs.run == 'true' && success()
        run: |
          set +e
          npm --prefix packages/coding-agent test -- \
            test/session-rail-skill-state.test.ts \
            test/session-rail.test.ts \
            test/session-rail-enhancement.test.ts \
            test/session-rail-style.test.ts \
            > /tmp/side-rail-focused-tests.txt 2>&1
          status=$?
          set -e
          cat /tmp/side-rail-focused-tests.txt
          exit "$status"

      - name: Upload focused test diagnostics
        if: failure() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: side-rail-focused-tests
          path: /tmp/side-rail-focused-tests.txt
          if-no-files-found: ignore

      - name: Build repository
        if: steps.gate.outputs.run == 'true' && success()
        run: npm run build

      - name: Run coding-agent tests
        if: steps.gate.outputs.run == 'true' && success()
        run: |
          set +e
          npm --prefix packages/coding-agent test > /tmp/coding-agent-tests.txt 2>&1
          status=$?
          set -e
          cat /tmp/coding-agent-tests.txt
          exit "$status"

      - name: Upload coding-agent diagnostics
        if: failure() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coding-agent-tests
          path: /tmp/coding-agent-tests.txt
          if-no-files-found: ignore

      - name: Run repository checks
        if: steps.gate.outputs.run == 'true' && success()
        run: npm run check

      - name: Commit the validated fix
        if: steps.gate.outputs.run == 'true' && success()
        run: |
          rm -f \
            .github/apply-side-rail-fix.py \
            .github/apply-side-rail-fix-v2.py \
            .github/apply-side-rail-fix-v3.py \
            .github/apply-side-rail-fix-v4.py \
            .github/write-side-rail-tests-v3.py \
            .github/side-rail-apply-error.txt \
            .github/side-rail-validation.txt \
            .github/workflows/apply-side-rail-fix.yml \
            .github/workflows/apply-side-rail-fix-pr.yml
          git config user.name "All-For-One Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix side rail skill state"
          git push origin HEAD:${{ github.head_ref }}
