name: Legacy Resource Cleanup Validation

on:
  pull_request:
    branches: [ui/enhancement]

permissions:
  contents: write

jobs:
  validate-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPECTED_HEAD: a3ce0de61a7d6fd0ec4ec66f4bef652dbf7ff731
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: diagnostic/legacy-resource-cleanup
          fetch-depth: 0
          persist-credentials: true

      - name: Stage apply script and checkout ui/enhancement
        shell: bash
        run: |
          set -euo pipefail
          cp .github/scripts/apply-legacy-resource-cleanup.sh /tmp/apply-legacy-resource-cleanup.sh
          git checkout -B ui/enhancement origin/ui/enhancement
          actual=$(git rev-parse HEAD)
          test "$actual" = "$EXPECTED_HEAD" || {
            echo "Expected $EXPECTED_HEAD but found $actual" >&2
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Capture unmodified branch static-check baseline
        id: baseline_check
        shell: bash
        run: |
          set +e
          npm run check > /tmp/check-before.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 100 /tmp/check-before.log
          exit 0

      - name: Apply cleanup implementation
        run: bash /tmp/apply-legacy-resource-cleanup.sh

      - name: Format changes and regenerate package locks
        shell: bash
        run: |
          set -euo pipefail
          npx biome check --write \
            packages/coding-agent/src/core/deprecated-resources.ts \
            packages/coding-agent/src/core/resource-loader.ts \
            packages/coding-agent/src/modes/interactive/theme/theme.ts \
            packages/coding-agent/test/bundled-themes.test.ts \
            packages/coding-agent/test/resource-loader.test.ts \
            packages/coding-agent/package.json
          npm run shrinkwrap:coding-agent
          npm run install-lock:coding-agent

      - name: Build workspace
        run: npm run build

      - name: Verify focused regression tests
        run: >-
          npm --workspace @earendil-works/pi-coding-agent exec -- vitest --run
          test/bundled-themes.test.ts
          test/resource-loader.test.ts
          test/native-skills.test.ts
          test/theme-picker.test.ts
          test/theme-detection.test.ts

      - name: Verify incremental build removes stale resources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p packages/coding-agent/dist/modes/interactive/theme
          mkdir -p packages/coding-agent/dist/skills/microsoft-foundry
          printf '{}\n' > packages/coding-agent/dist/modes/interactive/theme/tokyonight.json
          printf '%s\n' '---' 'name: microsoft-foundry' 'description: stale' '---' > packages/coding-agent/dist/skills/microsoft-foundry/SKILL.md
          npm --workspace @earendil-works/pi-coding-agent run build
          test ! -e packages/coding-agent/dist/modes/interactive/theme/tokyonight.json
          test ! -e packages/coding-agent/dist/skills/microsoft-foundry

      - name: Run coding-agent test suite
        run: npm --workspace @earendil-works/pi-coding-agent test

      - name: Run targeted static validation
        shell: bash
        run: |
          set -euo pipefail
          npx biome check \
            packages/coding-agent/src/core/deprecated-resources.ts \
            packages/coding-agent/src/core/resource-loader.ts \
            packages/coding-agent/src/modes/interactive/theme/theme.ts \
            packages/coding-agent/test/bundled-themes.test.ts \
            packages/coding-agent/test/resource-loader.test.ts \
            packages/coding-agent/package.json
          npm run check:shrinkwrap
          npm run check:install-lock:coding-agent
          npx tsgo --noEmit
          git diff --check

      - name: Capture final full static check
        id: final_check
        shell: bash
        run: |
          set +e
          npm run check > /tmp/check-after.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 100 /tmp/check-after.log
          exit 0

      - name: Upload static-check comparison
        uses: actions/upload-artifact@v4
        with:
          name: static-check-comparison
          path: |
            /tmp/check-before.log
            /tmp/check-after.log
          if-no-files-found: error
          retention-days: 1

      - name: Verify no new full-check regression
        shell: bash
        env:
          BASELINE_STATUS: ${{ steps.baseline_check.outputs.status }}
          FINAL_STATUS: ${{ steps.final_check.outputs.status }}
        run: |
          set -euo pipefail
          if [ "$FINAL_STATUS" = "0" ]; then
            exit 0
          fi
          if [ "$BASELINE_STATUS" = "0" ]; then
            echo "The cleanup introduced a new full static-check failure." >&2
            exit 1
          fi
          echo "Full static checking remains blocked by the branch's pre-existing baseline failure; targeted validation passed."

      - name: Restore generated model catalogs
        shell: bash
        run: |
          set -euo pipefail
          git restore --worktree -- \
            packages/ai/src/models.generated.ts \
            packages/ai/src/image-models.generated.ts \
            ':(glob)packages/ai/src/providers/*.models.ts' || true

      - name: Commit validated fix to ui/enhancement
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: remove deprecated theme and skill resources"
          git push origin HEAD:ui/enhancement
