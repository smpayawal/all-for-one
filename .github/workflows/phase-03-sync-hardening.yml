name: Phase 3 synchronization hardening

on:
  push:
    branches: [product/phase-03-upstream-sync]

permissions:
  contents: write

concurrency:
  group: phase-03-sync-hardening
  cancel-in-progress: true

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout phase branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: product/phase-03-upstream-sync
          fetch-depth: 0

      - name: Apply deterministic fetch and CI dispatch changes
        run: |
          python - <<'PY'
          from pathlib import Path

          ci = Path('.github/workflows/allforone-ci.yml')
          content = ci.read_text()
          old = '''  push:
    branches: [allforone]

permissions:
'''
          new = '''  push:
    branches: [allforone]
  workflow_dispatch:

permissions:
'''
          if old not in content:
              raise SystemExit('All-For-One CI trigger block not found')
          ci.write_text(content.replace(old, new, 1))

          sync = Path('.github/workflows/upstream-pi-sync.yml')
          content = sync.read_text()
          content = content.replace(
              'git fetch --no-tags origin main allforone',
              'git fetch --no-tags origin main:refs/remotes/origin/main allforone:refs/remotes/origin/allforone',
          )
          content = content.replace(
              'git fetch --no-tags upstream main',
              'git fetch --no-tags upstream main:refs/remotes/upstream/main',
          )
          old = '''    permissions:
      contents: write
      pull-requests: write
'''
          new = '''    permissions:
      actions: write
      contents: write
      pull-requests: write
'''
          if old not in content:
              raise SystemExit('prepare-sync permissions block not found')
          content = content.replace(old, new, 1)
          old = '''          gh pr create \\
            --base allforone \\
            --head "${branch}" \\
            --title "chore: synchronize Pi ${short_sha}" \\
            --body-file /tmp/upstream-sync-pr.md
'''
          new = '''          pr_url="$(gh pr create \\
            --base allforone \\
            --head "${branch}" \\
            --title "chore: synchronize Pi ${short_sha}" \\
            --body-file /tmp/upstream-sync-pr.md)"

          gh workflow run allforone-ci.yml --ref "${branch}"
          printf 'Created synchronization pull request: %s\\n' "${pr_url}" >> "${GITHUB_STEP_SUMMARY}"
          echo 'Dispatched All-For-One CI for the synchronization commit.' >> "${GITHUB_STEP_SUMMARY}"
'''
          if old not in content:
              raise SystemExit('sync PR creation block not found')
          sync.write_text(content.replace(old, new, 1))
          PY

          git diff --check

      - name: Commit synchronization hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/allforone-ci.yml .github/workflows/upstream-pi-sync.yml
          git commit -m "fix(upstream): dispatch CI for generated sync pull requests"
          git push origin HEAD:product/phase-03-upstream-sync
