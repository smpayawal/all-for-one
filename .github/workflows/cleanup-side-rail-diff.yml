name: Clean Side Rail generated diff

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/fix-side-rail-skill-state'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore generated provider catalogs
        run: |
          git fetch origin main
          git checkout origin/main -- \
            packages/ai/src/providers/opencode.models.ts \
            packages/ai/src/providers/openrouter.models.ts \
            packages/ai/src/providers/vercel-ai-gateway.models.ts
          rm .github/workflows/cleanup-side-rail-diff.yml
          git config user.name "All-For-One Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "chore remove generated model drift"
          git push origin HEAD:${{ github.head_ref }}
