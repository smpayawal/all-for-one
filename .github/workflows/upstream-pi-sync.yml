name: Upstream Pi Reference

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/upstream-pi-sync.yml'
      - 'scripts/check-upstream-relationship.mjs'
      - 'scripts/check-upstream-relationship.test.mjs'
      - 'scripts/upstream-sync-status.mjs'
      - 'scripts/upstream-sync-status.test.mjs'
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:
    inputs:
      action:
        description: 'Pi reference action'
        required: true
        default: check
        type: choice
        options:
          - check
          - update-pi

permissions: {}

concurrency:
  group: upstream-pi-reference-${{ github.event_name == 'pull_request' && github.ref || 'repository' }}
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: https://github.com/earendil-works/pi.git

jobs:
  status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pi_action: ${{ steps.report.outputs.pi_action }}
      pi_sha: ${{ steps.report.outputs.pi_sha }}
      upstream_sha: ${{ steps.report.outputs.upstream_sha }}
      product_action: ${{ steps.report.outputs.product_action }}
    steps:
      - name: Checkout All-For-One
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'main' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch tracked refs
        run: |
          set -euo pipefail
          git fetch --no-tags origin pi:refs/remotes/origin/pi main:refs/remotes/origin/main
          git remote add upstream "${UPSTREAM_REPOSITORY}"
          git fetch --no-tags upstream main:refs/remotes/upstream/main

      - name: Test synchronization status model
        run: |
          node --test scripts/check-upstream-relationship.test.mjs
          node --test scripts/upstream-sync-status.test.mjs

      - name: Report upstream status
        id: report
        run: |
          set -euo pipefail
          node scripts/upstream-sync-status.mjs \
            --main origin/pi \
            --product origin/main \
            --upstream upstream/main \
            --json > upstream-sync-status.json

          node --input-type=module <<'NODE'
          import { readFileSync, appendFileSync } from 'node:fs';
          const report = JSON.parse(readFileSync('upstream-sync-status.json', 'utf8'));
          const output = process.env.GITHUB_OUTPUT;
          appendFileSync(output, `pi_action=${report.main.action}\n`);
          appendFileSync(output, `pi_sha=${report.main.commit}\n`);
          appendFileSync(output, `upstream_sha=${report.main.upstreamCommit}\n`);
          appendFileSync(output, `product_action=${report.product.action}\n`);
          NODE

          {
            echo '## Upstream Pi reference status'
            echo
            echo '```json'
            cat upstream-sync-status.json
            echo '```'
            echo
            echo 'Updating `pi` does not merge upstream Pi into `main`.'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload status report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: upstream-pi-reference-status
          path: upstream-sync-status.json
          if-no-files-found: error
          retention-days: 14

  update-pi:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'update-pi'
    needs: status
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Pi reference
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: pi
          fetch-depth: 0

      - name: Fast-forward Pi reference
        env:
          EXPECTED_ACTION: ${{ needs.status.outputs.pi_action }}
          EXPECTED_PI_SHA: ${{ needs.status.outputs.pi_sha }}
          EXPECTED_UPSTREAM_SHA: ${{ needs.status.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin pi:refs/remotes/origin/pi
          git remote add upstream "${UPSTREAM_REPOSITORY}"
          git fetch --no-tags upstream main:refs/remotes/upstream/main

          actual_pi_sha="$(git rev-parse origin/pi)"
          actual_upstream_sha="$(git rev-parse upstream/main)"
          test "${actual_pi_sha}" = "${EXPECTED_PI_SHA}"
          test "${actual_upstream_sha}" = "${EXPECTED_UPSTREAM_SHA}"

          if [[ "${EXPECTED_ACTION}" == "current" ]]; then
            echo '`pi` already matches upstream Pi.' >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if [[ "${EXPECTED_ACTION}" != "fast-forward" ]]; then
            echo "::error::pi cannot be safely fast-forwarded; status is ${EXPECTED_ACTION}."
            exit 1
          fi

          git push origin upstream/main:refs/heads/pi
          echo "Fast-forwarded pi to ${actual_upstream_sha}." >> "${GITHUB_STEP_SUMMARY}"
          echo 'Review and adopt relevant changes through focused branches created from `main`.' >> "${GITHUB_STEP_SUMMARY}"
