name: Phase 1 metadata normalization

on:
  push:
    branches: [product/phase-01-safe-identity]

permissions:
  contents: write

concurrency:
  group: phase-01-metadata-normalize
  cancel-in-progress: true

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout phase branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: product/phase-01-safe-identity
          fetch-depth: 0

      - name: Restore generated metadata from current product base
        run: |
          git fetch --no-tags origin allforone
          git checkout origin/allforone -- package-lock.json packages/coding-agent/npm-shrinkwrap.json packages/coding-agent/install-lock

      - name: Apply intended package-lock metadata
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const rootPackage = JSON.parse(readFileSync('package.json', 'utf8'));
          const codingAgentPackage = JSON.parse(readFileSync('packages/coding-agent/package.json', 'utf8'));
          const lock = JSON.parse(readFileSync('package-lock.json', 'utf8'));

          lock.name = rootPackage.name;
          lock.version = rootPackage.version;
          lock.packages[''].name = rootPackage.name;
          lock.packages[''].version = rootPackage.version;
          lock.packages['packages/coding-agent'].bin = codingAgentPackage.bin;

          writeFileSync('package-lock.json', `${JSON.stringify(lock, null, '\t')}\n`);
          NODE

      - name: Regenerate derived package metadata
        run: |
          node scripts/generate-coding-agent-shrinkwrap.mjs
          node scripts/generate-coding-agent-install-lock.mjs
          git diff --check

      - name: Commit normalized metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json packages/coding-agent/npm-shrinkwrap.json packages/coding-agent/install-lock
          git commit -m "fix(product): limit generated metadata to identity changes"
          git push origin HEAD:product/phase-01-safe-identity
